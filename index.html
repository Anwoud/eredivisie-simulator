<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Eredivisie Stand Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 12px;
  background: #f7f7f7;
}

#eredivisie-logo {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 80px;
  opacity: 0.15;
}


h2 { margin-bottom: 6px; }

select { font-size: 16px; margin-bottom: 10px; }

.match {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 6px 0;
}
.match span { width: 90px; text-align: center; }
.match input { width: 44px; text-align: center; font-size: 16px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

/* Positiekleuren */
.pos2 { background:#2e8b57; color:#fff; }
.pos3 { background:#1e90ff; color:#fff; }
.pos4 { background:#ffd700; color:#000; }
.pos5, .pos6, .pos7, .pos8, .pos9 { background:#c00; color:#fff; }

/* Tickets */
.badge {
  display: inline-block;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
}

.cl  { background:#0b6623; color:#fff; }
.clq { background:#2e8b57; color:#fff; }
.el {background:#ffd700;   /* GEEL - Europa League */color:#000;}

.elq {background:#ffa500;   /* ORANJE - Europa League voorronde */color:#000;}

.po {
  background:#c00;
  color:#fff;
}

.small { font-size: 13px; opacity: .9; }

.teamcell {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.teamcell img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}


.match-team {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 90px;
  justify-content: center;
}

.match-team img {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

.ticket {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

.ticket img {
  width: 20px;
  height: 20px;
}

.beker {
  width: 18px;
  height: 18px;
}

input:disabled {
  background-color: #eee;
  color: #666;
  cursor: not-allowed;
}


@keyframes bekerPulse {
  0%   { box-shadow: 0 0 6px rgba(255, 215, 0, 0.5); }
  50%  { box-shadow: 0 0 14px rgba(255, 215, 0, 0.9); }
  100% { box-shadow: 0 0 6px rgba(255, 215, 0, 0.5); }
}

.beker-winnaar {
  outline: 2px solid gold;
  animation: bekerPulse 2.5s infinite;
  font-weight: bold;
}



.tiebreak-star {
  color: gold;
  font-size: 14px;
  margin-left: 4px;
  cursor: help;
}


</style>
</head>

<body>

<img id="eredivisie-logo" src="eredivisie.png" alt="Eredivisie">

<h2>Eredivisie Simulator</h2>


Speelronde:
<select id="ronde" onchange="update()">
  <option value="30">30</option>
  <option value="31">31</option>
  <option value="32">32</option>
  <option value="33">33</option>
  <option value="34" selected>34</option>
</select>

Bekerwinnaar:
<select id="beker" onchange="update()">
  <option value="">Geen</option>
  <option value="Nec">NEC</option>
  <option value="Az">AZ</option>
</select>

<div id="bekerStatus" class="small"></div>

<h3>Wedstrijden</h3>
<div id="matches"></div>

<h3>Stand (posities 2 t/m 7)</h3>
<table>
<thead>
<tr>
  <th>Pos</th>
  <th>Team</th>
  <th>Pnt</th>
  <th>DS</th>
  <th>Europees ticket</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3>Play-offs Conference League</h3>
<div id="playoffs" class="small"></div>

<script>
// ================= CONFIG =================


function goalSelect(value, onChange, locked) {
  let html = `<select onchange="${onChange}" ${locked ? 'disabled' : ''}>`;
  for (let i = 0; i <= 9; i++) {
    html += `<option value="${i}" ${i === value ? 'selected' : ''}>${i}</option>`;
  }
  html += `</select>`;
  return html;
}


const teamLogos = {
  "AJAX": "logos/ajax.png",
  "Az": "logos/az.png",
  "Nec": "logos/nec.png",
  "Twente": "logos/twente.png",
  "Heerenveen": "logos/heerenveen.png",
  "Kakkies": "logos/kakkies.png",
  "PEC": "logos/pec.png",
  "GAE": "logos/gae.png",
  "PSV": "logos/psv.png",
  "Groningen": "logos/groningen.png",
  "Sparta": "logos/sparta.png",
  "Fortuna": "logos/fortuna.png",
  "Heracles": "logos/heracles.png",
  "NAC": "logos/nac.png",
  "Telstar": "logos/telstar.png",
  "Utreg": "logos/utreg.png",
  "Volendam": "logos/volendam.png",
  "Excelsior": "logos/excelsior.png"

};

const lockedRounds = [30,31];

const bekerGelockt = true;   // ← zet op true na de finale
const vasteBekerWinnaar = "Az"; 


function isLocked(round) {
  return lockedRounds.includes(round);
}

const focusTeams = ["Kakkies","Nec","Twente","AJAX","Az","Heerenveen","Utreg","Groningen","Sparta"];

const startStand = {
  Kakkies:{p:54,ds:21,gf:61},
  Nec:{p:53,ds:24,gf:71},
  Twente:{p:50,ds:18,gf:49},
  AJAX:{p:48,ds:17,gf:54},
  Az:{p:45,ds:4,gf:49},
  Heerenveen:{p:44,ds:6,gf:53},
  Utreg:{p:41,ds:10,gf:45},
  Groningen:{p:41,ds:5,gf:41},
  Sparta:{p:42,ds:-12,gf:35}
};

const wedstrijden = [

// SR 30 (DEFINITIEF)
{r:30,t:"Az",u:"Heerenveen",tg:3,ug:0},
{r:30,t:"Nec",u:"Kakkies",tg:1,ug:1},
{r:30,t:"Heracles",u:"AJAX",tg:0,ug:3},
{r:30,t:"Twente",u:"Volendam",tg:2,ug:1},
{r:30,t:"Utreg",u:"Telstar",tg:4,ug:1},
{r:30,t:"Groningen",u:"GAE",tg:0,ug:0},
{r:30,t:"Sparta",u:"PSV",tg:0,ug:2},


  // SR 31 (DEFINITIEF)
  {r:31,t:"Kakkies",u:"Groningen",tg:3,ug:1},
  {r:31,t:"Twente",u:"Nec",tg:1,ug:1},
  {r:31,t:"NAC",u:"AJAX",tg:0,ug:2},
  {r:31,t:"Heerenveen",u:"Fortuna",tg:2,ug:1},
  {r:31,t:"GAE",u:"Az",tg:0,ug:0},
  {r:31,t:"Excelsior",u:"Utreg",tg:4,ug:0},
  {r:31,t:"Telstar",u:"Sparta",tg:4,ug:1},

  // SR 32
  {r:32,t:"Fortuna",u:"Kakkies",tg:2,ug:2},
  {r:32,t:"Nec",u:"Telstar",tg:2,ug:1},
  {r:32,t:"Twente",u:"Az",tg:3,ug:4},
  {r:32,t:"AJAX",u:"PSV",tg:3,ug:2},
  {r:32,t:"Volendam",u:"Heerenveen",tg:1,ug:3},
  {r:32,t:"Utreg",u:"NAC",tg:3,ug:2},
  {r:32,t:"Groningen",u:"Excelsior",tg:3,ug:2},
  {r:32,t:"Sparta",u:"GAE",tg:1,ug:2},

  // SR 33
  {r:33,t:"Kakkies",u:"Az",tg:2,ug:2},
  {r:33,t:"Groningen",u:"Nec",tg:1,ug:1},
  {r:33,t:"Twente",u:"Sparta",tg:1,ug:1},
  {r:33,t:"AJAX",u:"Utreg",tg:3,ug:0},
  {r:33,t:"NAC",u:"Heerenveen",tg:0,ug:3},

  // SR 34
  {r:34,t:"PEC",u:"Kakkies",tg:1,ug:3},
  {r:34,t:"Nec",u:"GAE",tg:2,ug:1},
  {r:34,t:"PSV",u:"Twente",tg:1,ug:2},
  {r:34,t:"Heerenveen",u:"AJAX",tg:1,ug:4},
  {r:34,t:"Az",u:"NAC",tg:5,ug:0},
  {r:34,t:"Utreg",u:"Fortuna",tg:3,ug:2},
  {r:34,t:"Heracles",u:"Groningen",tg:3,ug:2},
  {r:34,t:"Sparta",u:"Excelsior",tg:2,ug:1}

];

// ================= CORE =================
function berekenStand(tot) {
  const s = JSON.parse(JSON.stringify(startStand));

  wedstrijden.forEach(w => {
    if (w.r > tot) return;
    const tg = Number(w.tg), ug = Number(w.ug);

    if (s[w.t]) {
      s[w.t].gf += tg;  
      s[w.t].ds += tg - ug;
      if (tg > ug) s[w.t].p += 3;
      if (tg === ug) s[w.t].p += 1;
    }
    if (s[w.u]) {
      s[w.u].gf += ug;
      s[w.u].ds += ug - tg;
      if (ug > tg) s[w.u].p += 3;
      if (tg === ug) s[w.u].p += 1;
    }
  });
  return s;
}

function updateScore(i,f,v) {
  wedstrijden[i][f] = Number(v);
  update();
}



// ================= TICKETS =================
function bepaalTickets(ranking, bekerWinnaar) {
  const tickets = {};
  const playoffs = new Set();

  // 1. Basis op competitie
  ranking.forEach((team, i) => {
    const pos = i + 2;
    if (pos === 2) tickets[team.team] = "CL";
    else if (pos === 3) tickets[team.team] = "CLQ";
    else if (pos === 4) tickets[team.team] = "ELQ";
    else if (pos >= 5 && pos <= 9) playoffs.add(team.team);
  });



  const bekerIndex = ranking.findIndex(t => t.team === bekerWinnaar);
  const bekerPos = bekerIndex !== -1 ? bekerIndex + 2 : null;

  // 2. Bepaal wie Europa League (direct) krijgt
  let elTeam = null;

  if (bekerPos >= 4) {
    // bekerwinnaar mag upgraden
    elTeam = bekerWinnaar;
  } else {
    // bekerwinnaar is 2e of 3e → EL gaat naar positie 4
    elTeam = ranking[2] ? ranking[2].team : null;
  }

  if (elTeam) {
    tickets[elTeam] = "EL";
    playoffs.delete(elTeam);
  }

  // 3. Verwijder oude ELQ op positie 4 (als die er was)
  Object.keys(tickets).forEach(t => {
    if (tickets[t] === "ELQ") delete tickets[t];
  });

  // 4. Ken exact één EL-voorronde toe
  for (let i = 2; i < ranking.length; i++) {
    const team = ranking[i].team;
    if (!tickets[team]) {
      tickets[team] = "ELQ";
      playoffs.delete(team);
      break;
    }
  }

  return { tickets, playoffs };
}


function badge(t) {
  if (t === "CL") {
    return '<span class="ticket"><img src="cl.png"> Champions League</span>';
  }
  if (t === "CLQ") {
    return '<span class="ticket"><img src="clq.png"> CL voorronde</span>';
  }
  if (t === "EL") {
    return '<span class="ticket"><img src="el.png"> Europa League</span>';
  }
  if (t === "ELQ") {
    return '<span class="ticket"><img src="elq.png"> EL voorronde</span>';
  }
  return "-";
}



// ================= UI =================
function update() {
  const ronde = Number(document.getElementById("ronde").value);
  
const beker = bekerGelockt
  ? vasteBekerWinnaar
  : (document.getElementById("beker").value || null);

 
 // Wedstrijden
  document.getElementById("matches").innerHTML =
    wedstrijden.map((w,i)=>({w,i}))
      .filter(x=>x.w.r===ronde)
      .map(x=>`
  
<div class="match">
  <span class="match-team">
    <img src="logos/${x.w.t.toLowerCase()}.png"
         onerror="this.style.display='none'">
    ${x.w.t}
  </span>



${goalSelect(
  x.w.tg,
  `updateScore(${x.i}, 'tg', this.value)`,
  isLocked(x.w.r)
)}


${goalSelect(
  x.w.ug,
  `updateScore(${x.i}, 'ug', this.value)`,
  isLocked(x.w.r)
)}


  <span class="match-team">
    <img src="logos/${x.w.u.toLowerCase()}.png"
         onerror="this.style.display='none'">
    ${x.w.u}
  </span>
${isLocked(x.w.r) ? '<span title="Uitslag definitief">🔒</span>' : ''}

</div>
`).join("");

  const stand = berekenStand(ronde);
  const ranking = focusTeams
    .map(t=>({team:t,...stand[t]}))
    
.sort((a,b)=> 
  b.p  - a.p  ||
  b.ds - a.ds ||
  b.gf - a.gf
);


  const {tickets,playoffs} = bepaalTickets(ranking, beker);

console.log("DEBUG tickets:", tickets);
console.log("DEBUG playoffs:", Array.from(playoffs));

console.log("DEBUG ranking:", ranking.map(t => t.team));


  document.getElementById("table").innerHTML =
  
ranking.map((x,i) => {
  const pos = i + 2;

  let rowClass = "";

  if (tickets[x.team] === "CL") {
    rowClass = "cl";
  } else if (tickets[x.team] === "CLQ") {
    rowClass = "clq";
  } else if (tickets[x.team] === "EL") {
    rowClass = "el";
  } else if (tickets[x.team] === "ELQ") {
    rowClass = "elq";
  } else if (playoffs.has(x.team)) {
    rowClass = "po";
  }

  return `
 <tr class="${rowClass} ${bekerGelockt && x.team === vasteBekerWinnaar ? 'beker-winnaar' : ''}">

    <td>${pos}</td>



<td class="teamcell">
  <img src="logos/${x.team.toLowerCase()}.png" onerror="this.style.display='none'">
  <span>
    ${x.team}
    
${bekerGelockt && x.team === vasteBekerWinnaar
  ? ' <span title="Bekerwinnaar definitief">🏆 <img src="beker.png" class="beker"></span>'
  : ''}

  </span>
</td>



    <td>${x.p}</td>
 

<td>
  ${x.ds}
  ${
    ranking.some(o =>
      o.team !== x.team &&
      o.p === x.p &&
      o.ds === x.ds &&
      x.gf > o.gf &&
      ranking.indexOf(x) < ranking.indexOf(o)
    )
      ? '<span class="tiebreak-star" title="Hoger geëindigd dankzij meer doelpunten gescoord">★</span>'
      : ''
  }
</td>



    <td>${
      tickets[x.team]
        ? badge(tickets[x.team])
        : playoffs.has(x.team)
           ? '<span class="ticket"><img src="po.png"> Play-offs Conference League</span>'
          : "-"
    }</td>
  </tr>
`;

    }).join("");

  document.getElementById("playoffs").innerText =
    Array.from(playoffs).join(", ") || "—";
}

const bekerSelect = document.getElementById("beker");

if (bekerGelockt) {
  bekerSelect.value = vasteBekerWinnaar;
  bekerSelect.disabled = true;
}

const bekerStatus = document.getElementById("bekerStatus");

if (bekerGelockt) {
  bekerStatus.innerHTML =
    `Bekerfinale gespeeld – winnaar definitief: ${vasteBekerWinnaar.toUpperCase()}
     🏆
     <img src="logos/${vasteBekerWinnaar.toLowerCase()}.png"
          style="width:18px; vertical-align:middle;"
          onerror="this.style.display='none'">
     <img src="beker.png"
          style="width:18px; vertical-align:middle;">`;
}
 else {
  bekerStatus.innerText = "";
}



update();
</script>
</body>
</html>
